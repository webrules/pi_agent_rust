name: Build for iSH

on: workflow_dispatch

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code

        uses: actions/checkout@v4

      - name: Setup Rust

        uses: dtolnay/rust-toolchain@stable

        with:

          targets: i686-unknown-linux-musl

      - name: Install Cross

        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Binary

        run: cross build --target i686-unknown-linux-musl --release

      - name: Upload Artifact

        uses: actions/upload-artifact@v4

        with:

          name: pi_agent_rust-ish

          path: target/i686-unknown-linux-musl/release/pi_agent_rust
 
